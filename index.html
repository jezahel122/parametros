<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rango de Números</title>
</head>
<body>

<form onsubmit="mostrarDatos(event)" method="get">
    <h1>Rango de Números</h1>

    <div>
        <label for="inicio">Número inicio:</label>
        <input type="number" id="inicio" name="inicio">
    </div>

    <div>
        <label for="fin">Número fin:</label>
        <input type="number" id="fin" name="fin">
    </div>

    <div>
        <button type="submit">Mostrar resultado</button>
    </div>
</form>

<div>
    <p id="mostrar"></p>
</div>

<script src="funciones/funciones.js"></script>

</body>
</html>
